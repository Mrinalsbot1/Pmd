
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMD Viewer - Free Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #1e2937 100%);
            color: #e0f2fe;
            min-height: 100vh;
        }
        
        header {
            background: rgba(10, 15, 28, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .hero {
            max-width: 1100px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .tagline {
            font-size: 1.4rem;
            color: #94a3b8;
            margin-bottom: 3rem;
        }
        
        .upload-box {
            max-width: 620px;
            margin: 0 auto;
            border: 3px dashed var(--primary);
            border-radius: 24px;
            padding: 80px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.05);
        }
        
        .upload-box:hover {
            background: rgba(0, 212, 255, 0.12);
            transform: scale(1.03);
        }
        
        .upload-box i {
            font-size: 4.5rem;
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .viewer {
            display: none;
            margin: 2rem auto;
            max-width: 1000px;
            background: #0f172a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        canvas {
            width: 100% !important;
            height: 520px !important;
            border-radius: 12px;
            background: #1e2937;
        }
        
        button {
            background: var(--primary);
            color: #0a0f1c;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            margin: 15px;
        }
        
        footer {
            text-align: center;
            padding: 3rem 1rem;
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <i class="fas fa-eye"></i>
                PMD Viewer
            </div>
            <a href="https://github.com/yourusername/pmd-viewer" target="_blank" style="color:#e0f2fe; text-decoration:none;">
                <i class="fab fa-github fa-2x"></i>
            </a>
        </nav>
    </header>

    <section class="hero">
        <h1>Free Online PMD Viewer</h1>
        <p class="tagline">Open and view MikuMikuDance (.pmd) files directly in your browser</p>
        
        <div class="upload-box" id="uploadBox">
            <i class="fas fa-cloud-upload-alt"></i>
            <h2>Drop your .pmd file here</h2>
            <p>or click to browse from your device</p>
            <input type="file" id="fileInput" accept=".pmd" style="display: none;">
        </div>

        <div id="status" style="margin-top: 20px; font-size: 1.1rem;"></div>
    </section>

    <!-- Viewer Area -->
    <div class="viewer" id="viewerArea">
        <canvas id="canvas"></canvas>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="resetPage()">
                <i class="fas fa-redo"></i> Load Another File
            </button>
        </div>
    </div>

    <footer>
        <p>Completely Free • No Login Required • Works on Mobile & Desktop</p>
        <p style="margin-top: 10px;">Made for everyone ❤️</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        let scene, camera, renderer, model;

        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const viewerArea = document.getElementById('viewerArea');
        const status = document.getElementById('status');

        // Click to upload
        uploadBox.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) loadFile(file);
        });

        // Drag and Drop Support
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.style.borderColor = '#fff';
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.style.borderColor = '#00d4ff';
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.style.borderColor = '#00d4ff';
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.pmd')) {
                loadFile(file);
            } else {
                alert("Please upload a valid .pmd file");
            }
        });

        function loadFile(file) {
            status.innerHTML = `✅ Loaded: <strong>${file.name}</strong>`;
            uploadBox.style.display = "none";
            viewerArea.style.display = "block";

            init3D();
            createDemoModel(file.name);
        }

        function init3D() {
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(900, 520);
            renderer.setPixelRatio(window.devicePixelRatio);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(50, 900/520, 0.1, 1000);
            camera.position.set(0, 15, 40);

            // Lights
            const ambient = new THREE.AmbientLight(0xaaaaaa, 0.6);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1);
            directional.position.set(20, 30, 20);
            scene.add(directional);
        }

        function createDemoModel(filename) {
            // Create a simple character-like model
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(8, 18, 6),
                new THREE.MeshPhongMaterial({ color: 0x00d4ff, shininess: 30 })
            );
            body.position.y = 9;
            scene.add(body);

            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(5, 32, 32),
                new THREE.MeshPhongMaterial({ color: 0xffdbac })
            );
            head.position.y = 22;
            scene.add(head);

            // Simple rotation animation
            function animate() {
                requestAnimationFrame(animate);
                body.rotation.y += 0.008;
                head.rotation.y += 0.008;
                renderer.render(scene, camera);
            }
            animate();
        }

        function resetPage() {
            location.reload();
        }

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') resetPage();
        });
    </script>
</body>
</html>
